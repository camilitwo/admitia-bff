server:
  port: ${PORT:8080}

spring:
  application:
    name: admitia-bff
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/admitia_bff}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-for-production-change-this-secret}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:720}
  csrf:
    enabled: false
  uploads-dir: ${APP_UPLOADS_DIR:uploads}
  email:
    mock-mode: ${APP_EMAIL_MOCK_MODE:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    cl.mtn.admitiabff: INFO
