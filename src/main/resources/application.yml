server:
  port: ${PORT:8080}

spring:
  application:
    name: admitia-bff
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES}
    refresh-token-minutes: ${APP_JWT_REFRESH_MINUTES}
    issuer: ${APP_JWT_ISSUER}
    audience: ${APP_JWT_AUDIENCE}
    clock-skew-seconds: ${APP_JWT_CLOCK_SKEW}
  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    allowed-providers: ${APP_FIREBASE_ALLOWED_PROVIDERS}
    max-auth-age-seconds: ${APP_FIREBASE_MAX_AUTH_AGE_SECONDS}
    check-revoked: ${APP_FIREBASE_CHECK_REVOKED}
  cookies:
    secure: ${APP_COOKIES_SECURE}
    same-site: ${APP_COOKIES_SAME_SITE}
  csrf:
    enabled: false
  uploads-dir: ${APP_UPLOADS_DIR:uploads}
  blob:
    token: ${BLOB_READ_WRITE_TOKEN:}
  email:
    mock-mode: ${APP_EMAIL_MOCK_MODE:false}
    # Remitente obligatorio. Debe ser un dominio verificado en Resend.
    from: ${APP_EMAIL_FROM}
    resend:
      api-key: ${RESEND_API_KEY}
      base-url: ${RESEND_BASE_URL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  payments:
    application-fee-clp: ${APP_PAYMENTS_APPLICATION_FEE_CLP:0}
    process-id: ${APP_PAYMENTS_PROCESS_ID:ADMISION}
    invoice-due-days: ${APP_PAYMENTS_INVOICE_DUE_DAYS:3}
    webhook-tolerance-seconds: ${APP_PAYMENTS_WEBHOOK_TOLERANCE_SECONDS:300}
    toku:
      base-url: ${TOKU_BASE_URL:https://api.trytoku.com}
      api-key: ${TOKU_API_KEY:}
      account-key: ${TOKU_ACCOUNT_KEY:}
      webhook-secret: ${TOKU_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info


logging:
  level:
    root: INFO
    cl.mtn.admitiabff: INFO
